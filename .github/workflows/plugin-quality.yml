name: Plugin quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Validate manifest and restart behavior
        run: python -m unittest tests.test_plugin
      - name: Compile plugin scripts
        run: python -m compileall -q plugins/agentour-compiler/scripts
